services:
  mlflow:
    build:
      context: ./docker/mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 5s
      timeout: 5s
      retries: 10

  train:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      RAW_DATA_DIR: /app/data/raw
      INTERIM_DATA_DIR: /app/data/interim
      PROCESSED_DATA_DIR: /app/data/processed
      MODELS_DIR: /app/models
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./params.yaml:/app/params.yaml:ro
    command: ["scripts.train"]

volumes:
  mlflow-data:
