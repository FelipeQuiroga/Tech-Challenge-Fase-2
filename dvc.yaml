stages:
  preprocess:
    cmd: python scripts/preprocess.py
    deps:
      - scripts/preprocess.py
      - src/ecommerce_recommender/data_loaders
      - src/ecommerce_recommender/preprocessing/cleaning.py
      - data/raw/retailrocket
    outs:
      - data/interim/events_clean.parquet

  feature_eng:
    cmd: python scripts/feature_eng.py
    deps:
      - scripts/feature_eng.py
      - src/ecommerce_recommender/preprocessing/encoding.py
      - src/ecommerce_recommender/preprocessing/splitting.py
      - data/interim/events_clean.parquet
    params:
      - split.val_fraction
      - split.test_fraction
    outs:
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
      - data/processed/user_id_map.json
      - data/processed/item_id_map.json

  train:
    cmd: python scripts/train.py
    deps:
      - scripts/train.py
      - src/ecommerce_recommender/models
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/user_id_map.json
      - data/processed/item_id_map.json
    params:
      - seed
      - train.ncf
    outs:
      - models/ncf.pt
      - models/item_knn.joblib
      - models/train_history.json

  evaluate:
    cmd: python scripts/evaluate.py
    deps:
      - scripts/evaluate.py
      - src/ecommerce_recommender/evaluation
      - src/ecommerce_recommender/models
      - models/ncf.pt
      - models/item_knn.joblib
      - data/processed/test.parquet
    params:
      - seed
      - evaluate
    metrics:
      - metrics.json:
          cache: false
